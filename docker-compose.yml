# Environment configuration - Change these values for server deployment
x-environment: &environment-config
  # Set to 'production' for server deployment, 'development' for local development
  ENVIRONMENT: development
  # Domain configuration (set to your domain for production)
  DOMAIN_NAME: localhost
  API_PORT: 8000
  FRONTEND_PORT: 3000
  # Database configuration
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
  POSTGRES_DB: database
  POSTGRES_PORT: 5432
  # Redis configuration
  REDIS_PORT: 6379
  # SMTP configuration
  SMTP_USER: andres.roblesgilcandas@gmail.com
  SMTP_PASS: gefl givw felu mess

services:
  backend:
    build: ./Backend
    container_name: fastapi_app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - redis
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-database}
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}
      - POSTGRES_DB=${POSTGRES_DB:-database}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SMTP_USER=${SMTP_USER:-andres.roblesgilcandas@gmail.com}
      - SMTP_PASS=${SMTP_PASS:-gefl givw felu mess}
      - BASE_URL=${BASE_URL:-http://localhost}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    networks:
      - fairshare_network
    volumes:
      - ./Backend:/app
  
  frontend:
    build: 
      context: ./Frontend
      args:
        - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL:-http://localhost:8000}
    container_name: react_app
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - API_PORT=${API_PORT:-8000}
    networks:
      - fairshare_network

  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - fairshare_network

  db:
    image: postgres:15
    container_name: postgres_local
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-database}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migration:/docker-entrypoint-initdb.d
    networks:
      - fairshare_network

networks:
  fairshare_network:
    driver: bridge

volumes:
  pg_data:
